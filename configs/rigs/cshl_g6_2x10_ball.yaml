# CSHL G6 rig configuration — 2x10 (full 360°), FLY-ON-BALL variant
#
# Same arena + USB/serial controller as cshl_g6_2x10.yaml, but this rig has a
# FicTrac ball tracker, so it declares the `fictrac` plugin. That declaration is
# the PHYSICAL-capability signal: the v3 designer offers the FicTrac closed-loop
# plugin here (and flags fictrac-using experiments as unsupported on rigs that
# lack it). It is NOT about logging — the logging bridge is used by every
# web-runner rig regardless of whether FicTrac is present.
#
# The `fictrac` config below is the bridge/connection default (a host-side
# service). gain/offset are experiment-level (per-trial), not fixed by the rig.
#
# Authored for webDisplayTools. Schema mirrors maDisplayTools configs/rigs/.

format_version: "1.0"
name: "CSHL G6 2x10 (fly-on-ball)"
description: "CSHL fly-on-ball rig — G6 2x10 arena (full 360°), controller over USB/serial, FicTrac ball tracker via the local bridge"

arena: "G6_2x10"

controller:
  host: "0.0.0.0" # not used for serial/USB
  port: 62222

# FicTrac ball tracker (the physical fly-on-ball capability). The web runner
# drives closed-loop via the local bridge (fictrac-bridge/bridge.py) + Mode-3
# host-stepping. `enabled: true` marks it present on this rig.
plugins:
  fictrac:
    enabled: true
    type: "fictrac"
    bridge_url: "ws://localhost:8765"
    fictrac_port: 60000
# Note: AO (analog-out) is a controller-native command, not a rig plugin.

# Controller I/O roles + power-on defaults (#135) — see cshl_g6_2x10.yaml for
# the full schema comments. All off = nothing driven at connect.
io:
  dio:
    - port: 0
      role: off # off | in_trigger | out_programmable | out_debug_framescan
      default: 0
    - port: 1
      role: off
      default: 0
  ai:
    role: off # off | in (fw-gated)
  ao:
    role: off # off | programmable | frame_number (fw-gated)
    # default: 5.0            # volts at connect — some hardware expects 5 V idle
