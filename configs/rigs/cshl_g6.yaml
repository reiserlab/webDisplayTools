# CSHL G6 rig configuration
#
# Course rig for the G6 web-control workflow ("the web is the runner"): the v3
# Experiment Designer and the Arena Console drive a G6 2x10 arena directly from
# the browser over USB/serial. No external plugins — CSHL runs the arena alone,
# without a camera, backlight, or temperature device.
#
# Authored for webDisplayTools (LAB-91). Schema mirrors maDisplayTools
# configs/rigs/ (format_version "1.0").

format_version: "1.0"
name: "CSHL G6"
description: "CSHL course rig — G6 2x10 arena, controller over USB/serial, no external plugins"

# Arena reference (web config name). The webDisplayTools v3 designer resolves this
# via js/arena-configs.js — getConfig("G6_2x10") — and the Pattern Set builder locks
# its target arena to it (the bundle you build must match the rig's arena). This is a
# reference by name into the existing web registry, not a copy of any arena geometry.
# (maDisplayTools rigs put a relative path to an arena YAML here instead; this rig is
# web-first, so it names the web config directly.)
arena: "G6_2x10"

# Controller transport. CSHL connects over USB/serial, selected at runtime via
# the browser's Web Serial port picker — so host/port are NOT used by the web
# runner. They are kept for schema compatibility with maDisplayTools, where rigs
# reach the controller over TCP/Ethernet.
controller:
  host: "0.0.0.0" # not used for serial/USB
  port: 62222

# No external plugins. CSHL has no camera, backlight, or temperature hardware.
# An empty mapping means the v3 designer's rig-aware plugin assist offers nothing
# (no spurious plugins).
plugins: {}
# Note: AO (analog-out) is a controller-native command, not a rig plugin
# (LAB-80/81/82) — it does not belong in this plugins block.
