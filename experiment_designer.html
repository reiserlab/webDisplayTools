}

/**
 * Render a single command as a card in the visual editor.
 */
function renderCommandCard(cmd, cmdIndex, canDelete, totalCommands) {
    var typeClass = 'type-' + cmd.type;
    var borderColor = cmd.type === 'controller' ? '#00e676' : cmd.type === 'wait' ? '#8b949e' : '#4dabf7';

    var html = '<div class="cmd-card" data-cmd="' + cmdIndex + '" style="border-left: 3px solid ' + borderColor + '; margin-bottom: 0.4rem; padding: 0.5rem 0.6rem; background: rgba(0,0,0,0.15); border-radius: 0 4px 4px 0;">';

    // Header row with type badge, reorder arrows, and delete
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.3rem;">';
    html += '<span class="type-badge ' + typeClass + '">' + cmd.type + '</span>';
    html += '<span style="color:var(--text-dim);font-size:0.75rem;">';
    if (cmd.plugin_name) html += cmd.plugin_name + ' \u2192 ';
    html += (cmd.command_name || '') + '</span>';
    html += '<span style="display:flex;align-items:center;gap:0.15rem;">';
    if (totalCommands > 1) {
        if (cmdIndex > 0) {
            html += '<button class="cmd-move-btn" data-cmd="' + cmdIndex + '" data-dir="up" title="Move command up">\u25b2</button>';
        }
        if (cmdIndex < totalCommands - 1) {
            html += '<button class="cmd-move-btn" data-cmd="' + cmdIndex + '" data-dir="down" title="Move command down">\u25bc</button>';
        }
    }
    if (canDelete) {
        html += '<button class="cmd-delete-btn" data-cmd="' + cmdIndex + '" title="Remove this command">\u00d7</button>';
    }
    html += '</span>';
    html += '</div>';

    // Command-specific fields
    if (cmd.command_name === 'trialParams') {
        var isMode4 = cmd.mode === 4;
        html += '<div class="field" style="margin-bottom:0.3rem;"><label>Pattern</label>' +
            '<input type="text" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="pattern" value="' + escapeAttr(cmd.pattern || '') + '" placeholder="pattern_file.pat"></div>';
        html += '<div style="display:flex;gap:0.5rem;">';
        html += '<div class="field" style="flex:1;"><label>Duration</label><input type="number" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="duration" min="0.1" step="0.1" value="' + (cmd.duration || 5) + '"></div>';
        html += '<div class="field" style="flex:1;"><label>Mode</label><select class="cmd-field" data-cmd="' + cmdIndex + '" data-field="mode"><option value="2"' + (cmd.mode === 2 ? ' selected' : '') + '>Constant Rate</option><option value="4"' + (cmd.mode === 4 ? ' selected' : '') + '>Closed-Loop</option></select></div>';
        html += '</div>';
        html += '<div style="display:flex;gap:0.5rem;">';
        html += '<div class="field" style="flex:1;' + (isMode4 ? 'opacity:0.35' : '') + '"><label>Frame Rate</label><input type="number" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="frame_rate" value="' + (cmd.frame_rate || 60) + '"' + (isMode4 ? ' disabled' : '') + '></div>';
        html += '<div class="field" style="flex:1;' + (!isMode4 ? 'opacity:0.35' : '') + '"><label>Gain</label><input type="number" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="gain" value="' + (cmd.gain || 0) + '"' + (!isMode4 ? ' disabled' : '') + '></div>';
        html += '<div class="field" style="flex:1;"><label>Start Frame</label><input type="number" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="frame_index" min="1" value="' + (cmd.frame_index || 1) + '"></div>';
        html += '</div>';
    } else if (cmd.type === 'wait') {
        html += '<div class="field"><label>Duration (s)</label><input type="number" class="cmd-field" data-cmd="' + cmdIndex + '" data-field="duration" min="0" step="0.1" value="' + (cmd.duration || 0) + '"></div>';
    } else if (cmd.params && typeof cmd.params === 'object') {
        // Plugin command with params
        var paramKeys = Object.keys(cmd.params);
        for (var pk = 0; pk < paramKeys.length; pk++) {
            html += '<div class="field" style="margin-bottom:0.2rem;"><label>' + paramKeys[pk] + '</label>' +
                '<input type="text" class="cmd-param-field" data-cmd="' + cmdIndex + '" data-param="' + paramKeys[pk] + '" value="' + escapeAttr(String(cmd.params[paramKeys[pk]])) + '"></div>';
        }
    }
    // Plugin commands without params — no additional fields needed

    html += '</div>'; // cmd-card
    return html;
}

/**
 * Bind events for command card fields.
 */
function bindCommandCardEvents(commands, onChange) {
    // Field edits
    document.querySelectorAll('.cmd-field').forEach(function(el) {
        var eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, function() {
            var ci = parseInt(this.dataset.cmd);
            var field = this.dataset.field;
            var cmd = commands[ci];
            if (!cmd) return;

            if (field === 'mode') {
                cmd.mode = parseInt(this.value);
                if (cmd.mode === 2) { cmd.gain = 0; } else { cmd.frame_rate = 0; }
                renderEditor(); // re-render to update disabled fields
                return;
            }

            var val = this.value;
            if (['duration', 'frame_rate', 'gain', 'frame_index', 'pattern_ID'].indexOf(field) >= 0) {
                val = parseFloat(val);
                if (isNaN(val)) return;
            }
            cmd[field] = val;
            if (onChange) onChange();
        });
    });

    // Param fields (plugin params)
    document.querySelectorAll('.cmd-param-field').forEach(function(el) {
        el.addEventListener('input', function() {
            var ci = parseInt(this.dataset.cmd);
            var param = this.dataset.param;
            var cmd = commands[ci];
            if (!cmd || !cmd.params) return;
            var val = this.value;
            // Check schema type — keep string-typed params as strings (bug #57)
            var schema = getCommandParams('plugin', cmd.plugin_name, cmd.command_name);
            var paramSchema = schema && schema[param];
            if (paramSchema && paramSchema.type === 'string') {
                cmd.params[param] = val;
            } else {
                var num = Number(val);
                cmd.params[param] = (!isNaN(num) && val !== '') ? num : val;
            }
        });
    });

    // Delete buttons
    document.querySelectorAll('.cmd-delete-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var ci = parseInt(this.dataset.cmd);
            if (commands.length > 1) {
                commands.splice(ci, 1);
                renderEditor();
                if (onChange) onChange();
            }
        });
    });

    // Move up/down buttons
    document.querySelectorAll('.cmd-move-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var ci = parseInt(this.dataset.cmd);
            var dir = this.dataset.dir;
            var target = dir === 'up' ? ci - 1 : ci + 1;
            if (target >= 0 && target < commands.length) {
                var tmp = commands[ci];
                commands[ci] = commands[target];
                commands[target] = tmp;
                renderEditor();
                if (onChange) onChange();
            }
        });
    });
}

function renderPhaseEditor(phaseType) {
    var phase = experiment[phaseType];
    var content = document.getElementById('editorContent');
    var phaseLabels = { pretrial: 'Pretrial', intertrial: 'Intertrial', posttrial: 'Posttrial' };
    var label = phaseLabels[phaseType];

    var html = '<div class="editor-header"><h2>' + label + '</h2></div>' +
        '<div class="editor-form">' +
        '<div class="editor-section-label">Commands (' + phase.commands.length + ')</div>';

    // Render each command as a card (same as conditions)
    for (var ci = 0; ci < phase.commands.length; ci++) {
        html += renderCommandCard(phase.commands[ci], ci, phase.commands.length > 1, phase.commands.length);
    }

    // Add Command dropdown
    html += '<div style="margin-top: 0.5rem;">' +
        '<select id="addCommandSelect" title="Add a command to this phase" style="font-size:0.78rem;padding:0.3rem;background:var(--bg);border:1px dashed var(--border);color:var(--text-dim);border-radius:3px;width:100%;cursor:pointer;">' +
        buildAddCommandOptions() + '</select></div></div>';

    content.innerHTML = html;

    // Bind command card events
    bindCommandCardEvents(phase.commands, function() {
        renderTimeline();
        updateSummary();
        if (activeEditorTab === 'table') renderTableView();
    });

    document.getElementById('addCommandSelect').addEventListener('change', function(e) {

        if (newCmd) phase.commands.push(newCmd);
        e.target.value = '';
        renderEditor();
        renderTimeline();
        updateSummary();
    });
}

function escapeAttr(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// Table View
// ════════════════════════════════════════════════════

function renderTableView() {
    var container = document.getElementById('tableViewContent');
    var html = '';

    // Build sections: pretrial, conditions, intertrial, posttrial
    var sections = [];

    if (experiment.pretrial.include) {
        sections.push({
            key: 'pretrial',
            label: 'PRETRIAL',
            commands: getPhaseCommands(experiment.pretrial),
            sectionType: 'phase'
        });
    }

    for (var i = 0; i < experiment.conditions.length; i++) {
        var cond = experiment.conditions[i];
        sections.push({
            key: 'condition_' + i,
            label: 'CONDITION ' + (i + 1) + ': ' + (cond.id || ''),
            commands: getConditionCommands(cond),
            sectionType: 'condition',
            condIndex: i
        });

        // Show intertrial between conditions (except after last)
        if (experiment.intertrial.include && i < experiment.conditions.length - 1) {
            sections.push({
                key: 'intertrial_' + i,
                label: 'INTERTRIAL',
                commands: getPhaseCommands(experiment.intertrial),
                sectionType: 'phase-iti'
            });
        }
    }

    if (experiment.posttrial.include) {
        sections.push({
            key: 'posttrial',
            label: 'POSTTRIAL',
            commands: getPhaseCommands(experiment.posttrial),
            sectionType: 'phase'
        });
    }

    // Expand/Collapse all toolbar
    if (sections.length > 0) {
        html += '<div class="table-toolbar"><button id="tableExpandAll" title="Expand all sections">Expand All</button><button id="tableCollapseAll" title="Collapse all sections">Collapse All</button></div>';
    }

    for (var si = 0; si < sections.length; si++) {
        html += renderTableSection(sections[si]);
    }

    if (sections.length === 0) {
        html = '<div class="editor-placeholder" style="padding: 2rem;"><div><p>No phases or conditions defined.</p></div></div>';
    }

    container.innerHTML = html;
    bindTableEvents(sections);
}

/**
 * Get commands array from a phase (already stored as commands[]).
 */
function getPhaseCommands(phase) {
    return phase.commands || [];
}

/**
 * Get commands array from a condition (already stored as commands[]).
 */
function getConditionCommands(cond) {
    return cond.commands || [];
}

/**
 * Compute total duration of a command array.
 */
function computeSectionDuration(commands) {
    var tpDuration = 0;
    var waitTotal = 0;
    for (var i = 0; i < commands.length; i++) {
        var cmd = commands[i];
        if (cmd.command_name === 'trialParams' && cmd.duration) {
            tpDuration = cmd.duration;
        } else if (cmd.type === 'wait' && cmd.duration) {
            waitTotal += cmd.duration;
        }
    }
    return Math.max(tpDuration, waitTotal);
}

function renderTableSection(section) {
    var dur = computeSectionDuration(section.commands);
    var durStr = dur > 0 ? dur + 's' : '';
    var isCondition = section.sectionType === 'condition';
    var isIti = section.sectionType === 'phase-iti';

    var html = '<div class="table-section' + (isIti ? ' collapsed' : '') + '" data-section="' + section.key + '">';

    // Header
    html += '<div class="table-section-header' + (isIti ? ' collapsed' : '') + '" data-section="' + section.key + '">';
    html += '<span><span class="section-toggle">\u25BC</span> ' + escapeHtml(section.label) + '</span>';
    // Condition reorder arrows
    if (isCondition && experiment.conditions.length > 1) {
        html += '<span class="section-move-btns">';
        if (section.condIndex > 0) {
            html += '<button class="btn-section-move" data-cond="' + section.condIndex + '" data-dir="up" title="Move condition up">\u25b2</button>';
        }
        if (section.condIndex < experiment.conditions.length - 1) {
            html += '<button class="btn-section-move" data-cond="' + section.condIndex + '" data-dir="down" title="Move condition down">\u25bc</button>';
        }
        html += '</span>';
    }
    html += '<span class="section-duration">' + durStr + '</span>';
    if (isCondition && experiment.conditions.length > 1) {
        html += '<button class="btn-section-remove" data-cond="' + section.condIndex + '" title="Remove this condition">\u00d7</button>';
    }
    html += '</div>';

    // Body
    html += '<div class="table-section-body">';
    html += '<table class="cmd-table">';
    html += '<thead><tr>';
    html += '<th class="col-num">#</th>';
    html += '<th class="col-type">Type</th>';
    html += '<th class="col-target">Target</th>';
    html += '<th class="col-command">Command</th>';
    html += '<th class="col-dur">Dur</th>';
    html += '<th class="col-mode">Mode</th>';
    html += '<th class="col-fr">FR</th>';
    html += '<th class="col-pattern">Pattern / Params</th>';
    html += '<th class="col-move"></th>';
    html += '<th class="col-delete"></th>';
    html += '</tr></thead><tbody>';

    for (var ci = 0; ci < section.commands.length; ci++) {
        html += renderTableRow(section, ci, section.commands[ci]);
    }

    html += '</tbody></table>';

    // Add command dropdown (conditions and phases, not ITI duplicates)
    if (isCondition || section.sectionType === 'phase') {
        html += '<div class="table-add-row"><select class="table-add-cmd-select" data-section="' + section.key + '" title="Add a command to this section">' + buildAddCommandOptions() + '</select></div>';
    }

    html += '</div>'; // section-body
    html += '</div>'; // table-section

    return html;
}

function renderTableRow(section, rowIndex, cmd) {
    var isController = cmd.type === 'controller';
    var isWait = cmd.type === 'wait';
    var isPlugin = cmd.type === 'plugin';
    var isTrialParams = isController && cmd.command_name === 'trialParams';
    var isCondition = section.sectionType === 'condition';

    var html = '<tr data-section="' + section.key + '" data-row="' + rowIndex + '">';

    // #
    html += '<td class="col-num">' + (rowIndex + 1) + '</td>';

    // Type badge
    html += '<td class="col-type"><span class="type-badge type-' + cmd.type + '">' + cmd.type + '</span></td>';

    // Target (plugin name or empty)
    if (isPlugin) {
        html += '<td class="col-target">' + escapeHtml(cmd.plugin_name || '') + '</td>';
    } else {
        html += '<td class="col-target cell-dim">\u2014</td>';
    }

    // Command name
    html += '<td class="col-command">' + escapeHtml(cmd.command_name || '') + '</td>';

    // Duration (editable for trialParams and wait)
    if (cmd.duration !== undefined) {
        html += '<td class="col-dur"><input type="number" class="tbl-field" data-section="' + section.key + '" data-row="' + rowIndex + '" data-field="duration" value="' + cmd.duration + '" step="0.1" min="0" title="Duration in seconds"></td>';
    } else {
        html += '<td class="col-dur cell-dim">\u2014</td>';
    }

    // Mode (editable select for trialParams)
    if (isTrialParams) {
        html += '<td class="col-mode"><select class="tbl-field" data-section="' + section.key + '" data-row="' + rowIndex + '" data-field="mode" title="Display mode">' +
            '<option value="2"' + (cmd.mode === 2 ? ' selected' : '') + '>2</option>' +
            '<option value="4"' + (cmd.mode === 4 ? ' selected' : '') + '>4</option>' +
            '</select></td>';
    } else {
        html += '<td class="col-mode cell-dim">\u2014</td>';
    }

    // Frame Rate / Gain (editable for trialParams)
    if (isTrialParams) {
        if (cmd.mode === 4) {
            html += '<td class="col-fr"><input type="number" class="tbl-field" data-section="' + section.key + '" data-row="' + rowIndex + '" data-field="gain" value="' + (cmd.gain || 0) + '" title="Gain"></td>';
        } else {
            html += '<td class="col-fr"><input type="number" class="tbl-field" data-section="' + section.key + '" data-row="' + rowIndex + '" data-field="frame_rate" value="' + (cmd.frame_rate || 0) + '" min="1" title="Frame rate (fps)"></td>';
        }
    } else {
        html += '<td class="col-fr cell-dim">\u2014</td>';
    }

    // Pattern / Params (editable)
    if (isTrialParams) {
        html += '<td class="col-pattern"><input type="text" class="tbl-field" data-section="' + section.key + '" data-row="' + rowIndex + '" data-field="pattern" value="' + escapeAttr(cmd.pattern || '') + '" placeholder="pattern_file.pat" title="Pattern filename"></td>';
    } else if (isPlugin && cmd.params) {
        var paramFields = Object.keys(cmd.params).map(function(k) {
            return '<span style="white-space:nowrap;">' + escapeHtml(k) + ':<input type="text" class="tbl-param" data-section="' + section.key + '" data-row="' + rowIndex + '" data-param="' + escapeAttr(k) + '" value="' + escapeAttr(String(cmd.params[k])) + '" style="width:50px;display:inline;" title="' + escapeAttr(k) + '"></span>';
        }).join(' ');
        html += '<td class="col-pattern">' + paramFields + '</td>';
    } else {
        html += '<td class="col-pattern cell-dim">\u2014</td>';
    }

    // Actions: move arrows column + delete column (separate to avoid misclicks)
    var canEdit = isCondition || section.sectionType === 'phase';
    var moveHtml = '';
    var deleteHtml = '';
    if (canEdit && section.commands.length > 1) {
        if (rowIndex > 0) {
            moveHtml += '<button class="btn-row-move" data-section="' + section.key + '" data-row="' + rowIndex + '" data-dir="up" title="Move command up">\u25b2</button>';
        }
        if (rowIndex < section.commands.length - 1) {
            moveHtml += '<button class="btn-row-move" data-section="' + section.key + '" data-row="' + rowIndex + '" data-dir="down" title="Move command down">\u25bc</button>';
        }
        deleteHtml = '<button class="btn-row-delete" data-section="' + section.key + '" data-row="' + rowIndex + '" title="Remove this command">\u00d7</button>';
    }
    html += '<td class="col-move">' + moveHtml + '</td>';
    html += '<td class="col-delete">' + deleteHtml + '</td>';

    html += '</tr>';
    return html;
}

function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function bindTableEvents(sections) {
    // Expand All / Collapse All
    var expandBtn = document.getElementById('tableExpandAll');
    var collapseBtn = document.getElementById('tableCollapseAll');
    if (expandBtn) {
        expandBtn.addEventListener('click', function() {
            document.querySelectorAll('.table-section.collapsed').forEach(function(el) { el.classList.remove('collapsed'); });
            document.querySelectorAll('.table-section-header.collapsed').forEach(function(el) { el.classList.remove('collapsed'); });
        });
    }
    if (collapseBtn) {
        collapseBtn.addEventListener('click', function() {
            document.querySelectorAll('.table-section').forEach(function(el) { el.classList.add('collapsed'); });
            document.querySelectorAll('.table-section-header').forEach(function(el) { el.classList.add('collapsed'); });
        });
    }

    // Section collapse/expand
    document.querySelectorAll('.table-section-header').forEach(function(header) {
        header.addEventListener('click', function() {
            var sectionKey = this.getAttribute('data-section');
            var sectionEl = document.querySelector('.table-section[data-section="' + sectionKey + '"]');
            if (sectionEl) {
                sectionEl.classList.toggle('collapsed');
                this.classList.toggle('collapsed');
            }
        });
    });

    // Condition reorder buttons
    document.querySelectorAll('.btn-section-move').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var condIdx = parseInt(this.getAttribute('data-cond'));
            var dir = this.getAttribute('data-dir');
            var target = dir === 'up' ? condIdx - 1 : condIdx + 1;
            if (target >= 0 && target < experiment.conditions.length) {
                reorderConditions(condIdx, target);
                renderTableView();
            }
        });
    });

    // Condition remove buttons
    document.querySelectorAll('.btn-section-remove').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var condIdx = parseInt(this.getAttribute('data-cond'));
            removeCondition(condIdx);
            renderTableView();
        });
    });

    // Row click → select in commands editor
    document.querySelectorAll('.cmd-table tbody tr').forEach(function(row) {
        row.addEventListener('click', function(e) {
            // Don't trigger row selection when clicking inputs/buttons
            if (e.target.closest('input, select, button')) return;
            var sectionKey = this.getAttribute('data-section');
            // Highlight this row
            document.querySelectorAll('.cmd-table tr.selected').forEach(function(r) { r.classList.remove('selected'); });
            this.classList.add('selected');

            // If it's a condition, select it in the visual tab too
            if (sectionKey && sectionKey.startsWith('condition_')) {
                var idx = parseInt(sectionKey.split('_')[1]);
                if (!isNaN(idx) && idx < experiment.conditions.length) {
                    selection = { type: 'condition', index: idx };
                    renderTimeline();
                    // Don't re-render editor since we're in table view
                }
            } else if (sectionKey === 'pretrial' || sectionKey === 'posttrial') {
                selection = { type: sectionKey };
                renderTimeline();
            }
        });
    });

    // Editable table fields
    document.querySelectorAll('.tbl-field').forEach(function(el) {
        var eventType = el.tagName === 'SELECT' ? 'change' : 'input';
        el.addEventListener(eventType, function(e) {
            e.stopPropagation();
            var sectionKey = this.getAttribute('data-section');
            var rowIndex = parseInt(this.getAttribute('data-row'));
            var field = this.getAttribute('data-field');
            var section = sections.find(function(s) { return s.key === sectionKey; });
            if (!section) return;
            var cmd = section.commands[rowIndex];
            if (!cmd) return;

            if (field === 'mode') {
                cmd.mode = parseInt(this.value);
                if (cmd.mode === 2) { cmd.gain = 0; } else { cmd.frame_rate = 0; }
                renderTableView(); // re-render to swap FR/gain field
                renderTimeline();
                return;
            }

            var val = this.value;
            if (['duration', 'frame_rate', 'gain', 'frame_index', 'pattern_ID'].indexOf(field) >= 0) {
                val = parseFloat(val);
                if (isNaN(val)) return;
            }
            cmd[field] = val;
            renderTimeline();
            updateSummary();
        });
    });

    // Editable plugin param fields in table
    document.querySelectorAll('.tbl-param').forEach(function(el) {
        el.addEventListener('input', function(e) {
            e.stopPropagation();
            var sectionKey = this.getAttribute('data-section');
            var rowIndex = parseInt(this.getAttribute('data-row'));
            var param = this.getAttribute('data-param');
            var section = sections.find(function(s) { return s.key === sectionKey; });
            if (!section) return;
            var cmd = section.commands[rowIndex];
            if (!cmd || !cmd.params) return;
            var val = this.value;
            // Check schema type — keep string-typed params as strings (bug #57)
            var schema = getCommandParams('plugin', cmd.plugin_name, cmd.command_name);
            var paramSchema = schema && schema[param];
            if (paramSchema && paramSchema.type === 'string') {
                cmd.params[param] = val;
            } else {
                var num = Number(val);
                cmd.params[param] = (!isNaN(num) && val !== '') ? num : val;
            }
            renderTimeline();
        });
    });

    // Delete row buttons
    document.querySelectorAll('.btn-row-delete').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var sectionKey = this.getAttribute('data-section');
            var rowIndex = parseInt(this.getAttribute('data-row'));
            var section = sections.find(function(s) { return s.key === sectionKey; });
            if (section && section.commands.length > 1 && rowIndex < section.commands.length) {
                section.commands.splice(rowIndex, 1);
                renderTableView();
                renderTimeline();
                updateSummary();
            }
        });
    });

    // Move command up/down buttons
    document.querySelectorAll('.btn-row-move').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var sectionKey = this.getAttribute('data-section');
            var rowIndex = parseInt(this.getAttribute('data-row'));
            var dir = this.getAttribute('data-dir');
            var target = dir === 'up' ? rowIndex - 1 : rowIndex + 1;
            var section = sections.find(function(s) { return s.key === sectionKey; });
            if (section && target >= 0 && target < section.commands.length) {
                var tmp = section.commands[rowIndex];
                section.commands[rowIndex] = section.commands[target];
                section.commands[target] = tmp;
                renderTableView();
                renderTimeline();
                updateSummary();
            }
        });
    });

    // Add command dropdowns
    document.querySelectorAll('.table-add-cmd-select').forEach(function(sel) {
        sel.addEventListener('change', function(e) {
            if (!e.target.value) return;
            var sectionKey = this.getAttribute('data-section');
            var section = sections.find(function(s) { return s.key === sectionKey; });
            if (section) {
                var newCmd = createCommandFromSelectValue(e.target.value);
                if (newCmd) {
                    section.commands.push(newCmd);
                    renderTableView();
                    renderTimeline();
                    updateSummary();
                }
            }
            e.target.value = '';
        });
    });
}

// ════════════════════════════════════════════════════
// Multi-Lane Timeline View
// ════════════════════════════════════════════════════

/**
 * Compute lane positions from sequential command execution.
 *
 * Returns: {
 *   totalDuration: number,
 *   controllerSpans: [{ startTime, endTime, cmd, cmdIndex }],
 *   pluginEvents: { pluginName: [{ time, cmd, cmdIndex }] },
 *   waitSpans: [{ startTime, endTime, cmdIndex }],
 *   lanes: string[]  // ordered lane names: 'controller', plugin names...
 * }
 */
function computeLaneData(commands) {
    var clock = 0;
    var controllerSpans = [];
    var pluginEvents = {};
    var waitSpans = [];
    var controllerEndTime = 0;

    for (var i = 0; i < commands.length; i++) {
        var cmd = commands[i];

        if (cmd.command_name === 'trialParams') {
            // trialParams fires controller autonomously for duration seconds
            var dur = cmd.duration || 0;
            controllerSpans.push({ startTime: clock, endTime: clock + dur, cmd: cmd, cmdIndex: i });
            controllerEndTime = Math.max(controllerEndTime, clock + dur);
            // Clock does NOT advance — controller runs autonomously
        } else if (cmd.type === 'controller') {
            // Other controller commands (allOn, allOff, etc.) are instantaneous
            controllerSpans.push({ startTime: clock, endTime: clock, cmd: cmd, cmdIndex: i });
        } else if (cmd.type === 'wait') {
            var waitDur = cmd.duration || 0;
            waitSpans.push({ startTime: clock, endTime: clock + waitDur, cmdIndex: i });
            clock += waitDur;
        } else if (cmd.type === 'plugin') {
            var pName = cmd.plugin_name || 'plugin';
            if (!pluginEvents[pName]) pluginEvents[pName] = [];
            pluginEvents[pName].push({ time: clock, cmd: cmd, cmdIndex: i });
            // Plugin commands are instantaneous — clock does NOT advance
        }
    }

    // Total duration = max of clock (end of last wait) and controller end
    var totalDuration = Math.max(clock, controllerEndTime);
    if (totalDuration <= 0) totalDuration = 1;

    // Build ordered lane list
    var lanes = ['controller'];
    var pluginNames = Object.keys(pluginEvents);
    for (var pi = 0; pi < pluginNames.length; pi++) {
        lanes.push(pluginNames[pi]);
    }

    return {
        totalDuration: totalDuration,
        controllerSpans: controllerSpans,
        pluginEvents: pluginEvents,
        waitSpans: waitSpans,
        lanes: lanes
    };
}

/**
 * Build SVG markup for the multi-lane timeline.
 */
function buildLaneSVG(laneData, commands) {
    var MARGIN_LEFT = 90;
    var MARGIN_RIGHT = 20;
    var LANE_HEIGHT = 32;
    var LANE_GAP = 4;
    var TICK_HEIGHT = 16;
    var HEADER_HEIGHT = 20;

    var numLanes = laneData.lanes.length;
    var svgHeight = HEADER_HEIGHT + (numLanes * (LANE_HEIGHT + LANE_GAP)) + TICK_HEIGHT + 10;
    var svgWidth = '100%';

    // We'll use a viewBox so it scales. Use 800px logical width.
    var LOGICAL_WIDTH = 800;
    var trackWidth = LOGICAL_WIDTH - MARGIN_LEFT - MARGIN_RIGHT;
    var pxPerSec = trackWidth / laneData.totalDuration;

    var svg = '<svg viewBox="0 0 ' + LOGICAL_WIDTH + ' ' + svgHeight + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">';

    // Background
    svg += '<rect width="' + LOGICAL_WIDTH + '" height="' + svgHeight + '" fill="transparent"/>';

    // Time axis ticks
    var tickY = HEADER_HEIGHT;
    var tickInterval = getTickInterval(laneData.totalDuration);
    for (var t = 0; t <= laneData.totalDuration; t += tickInterval) {
        var tx = MARGIN_LEFT + t * pxPerSec;
        svg += '<line x1="' + tx + '" y1="' + tickY + '" x2="' + tx + '" y2="' + (svgHeight - 4) + '" stroke="#2d3640" stroke-width="0.5" stroke-dasharray="2,3"/>';
        svg += '<text x="' + tx + '" y="' + (tickY - 4) + '" fill="#8b949e" font-size="9" text-anchor="middle">' + formatTimeTick(t) + '</text>';
    }

    // Render each lane
    for (var li = 0; li < laneData.lanes.length; li++) {
        var laneName = laneData.lanes[li];
        var laneY = HEADER_HEIGHT + li * (LANE_HEIGHT + LANE_GAP);
        var laneCenter = laneY + LANE_HEIGHT / 2;

        // Lane label
        var labelColor = laneName === 'controller' ? '#00e676' : '#4dabf7';
        svg += '<text x="' + (MARGIN_LEFT - 8) + '" y="' + (laneCenter + 4) + '" fill="' + labelColor + '" font-size="10" text-anchor="end" font-weight="600">' + escapeHtml(laneName) + '</text>';

        // Lane background
        svg += '<rect x="' + MARGIN_LEFT + '" y="' + laneY + '" width="' + trackWidth + '" height="' + LANE_HEIGHT + '" fill="rgba(255,255,255,0.02)" rx="3"/>';

        if (laneName === 'controller') {
            // Render controller spans
            for (var ci = 0; ci < laneData.controllerSpans.length; ci++) {
                var span = laneData.controllerSpans[ci];
                var sx = MARGIN_LEFT + span.startTime * pxPerSec;

                if (span.startTime === span.endTime) {
                    // Instantaneous command (allOn, allOff, etc.) — diamond marker
                    svg += '<g class="tl-cmd" data-cmd="' + span.cmdIndex + '" style="cursor:pointer;">';
                    svg += '<polygon points="' + sx + ',' + (laneCenter - 6) + ' ' + (sx + 6) + ',' + laneCenter + ' ' + sx + ',' + (laneCenter + 6) + ' ' + (sx - 6) + ',' + laneCenter + '" fill="#00e676" opacity="0.8"/>';
                    svg += '<title>' + escapeHtml(span.cmd.command_name || '') + '</title>';
                    svg += '</g>';
                } else {
                    // Duration span (trialParams)
                    var sw = (span.endTime - span.startTime) * pxPerSec;
                    svg += '<g class="tl-cmd" data-cmd="' + span.cmdIndex + '" style="cursor:pointer;">';
                    svg += '<rect x="' + sx + '" y="' + (laneY + 4) + '" width="' + sw + '" height="' + (LANE_HEIGHT - 8) + '" fill="#00e676" opacity="0.2" rx="3" stroke="#00e676" stroke-width="1"/>';
                    // Label inside bar
                    var patLabel = (span.cmd.pattern || '').split('/').pop();
                    if (patLabel.length > 30) patLabel = patLabel.substring(0, 27) + '...';
                    var barLabel = patLabel + ' (' + span.cmd.duration + 's)';
                    if (sw > 60) {
                        svg += '<text x="' + (sx + 6) + '" y="' + (laneCenter + 3) + '" fill="#00e676" font-size="9" clip-path="url(#clip' + ci + ')">' + escapeHtml(barLabel) + '</text>';
                    }
                    svg += '<title>trialParams: ' + escapeHtml(patLabel) + ' | ' + span.cmd.duration + 's, mode ' + span.cmd.mode + ', FR ' + (span.cmd.frame_rate || 0) + '</title>';
                    svg += '</g>';
                }
            }
        } else {
            // Plugin lane — render event markers
            var events = laneData.pluginEvents[laneName] || [];
            for (var ei = 0; ei < events.length; ei++) {
                var evt = events[ei];
                var ex = MARGIN_LEFT + evt.time * pxPerSec;

                svg += '<g class="tl-cmd" data-cmd="' + evt.cmdIndex + '" style="cursor:pointer;">';
                // Circle marker
                svg += '<circle cx="' + ex + '" cy="' + laneCenter + '" r="5" fill="#4dabf7" opacity="0.8" stroke="#4dabf7" stroke-width="1"/>';
                // Label to the right if space
                var cmdLabel = evt.cmd.command_name || '';
                svg += '<text x="' + (ex + 8) + '" y="' + (laneCenter + 3) + '" fill="#4dabf7" font-size="8" opacity="0.7">' + escapeHtml(cmdLabel) + '</text>';

                // Tooltip
                var tipText = laneName + '.' + cmdLabel;
                if (evt.cmd.params) {
                    var pKeys = Object.keys(evt.cmd.params);
                    tipText += ' | ' + pKeys.map(function(k) { return k + '=' + evt.cmd.params[k]; }).join(', ');
                }
                svg += '<title>' + escapeHtml(tipText) + '</title>';
                svg += '</g>';
            }
        }
    }

    // Wait spans as gray bars at the bottom
    var waitY = HEADER_HEIGHT + numLanes * (LANE_HEIGHT + LANE_GAP);
    svg += '<text x="' + (MARGIN_LEFT - 8) + '" y="' + (waitY + 10) + '" fill="#8b949e" font-size="9" text-anchor="end">waits</text>';
    for (var wi = 0; wi < laneData.waitSpans.length; wi++) {
        var ws = laneData.waitSpans[wi];
        var wx = MARGIN_LEFT + ws.startTime * pxPerSec;
        var ww = (ws.endTime - ws.startTime) * pxPerSec;
        if (ww > 1) {
            svg += '<g class="tl-cmd" data-cmd="' + ws.cmdIndex + '" style="cursor:pointer;">';
            svg += '<rect x="' + wx + '" y="' + (waitY + 2) + '" width="' + ww + '" height="' + 10 + '" fill="#8b949e" opacity="0.15" rx="2" stroke="#8b949e" stroke-width="0.5"/>';
            if (ww > 20) {
                svg += '<text x="' + (wx + ww / 2) + '" y="' + (waitY + 10) + '" fill="#8b949e" font-size="7" text-anchor="middle">' + (ws.endTime - ws.startTime) + 's</text>';
            }
            svg += '<title>wait ' + (ws.endTime - ws.startTime) + 's</title>';
            svg += '</g>';
        }
    }

    svg += '</svg>';
    return svg;
}

/**
 * Get a nice tick interval for the time axis.
 */
function getTickInterval(totalDuration) {
    if (totalDuration <= 2) return 0.5;
    if (totalDuration <= 5) return 1;
    if (totalDuration <= 15) return 2;
    if (totalDuration <= 30) return 5;
    if (totalDuration <= 60) return 10;
    return 20;
}

function formatTimeTick(seconds) {
    if (seconds === 0) return '0s';
    if (seconds < 1) return seconds.toFixed(1) + 's';
    if (seconds === Math.floor(seconds)) return seconds + 's';
    return seconds.toFixed(1) + 's';
}

// ════════════════════════════════════════════════════
// YAML Export
// ════════════════════════════════════════════════════

function generateYAML() {
    var exp = experiment;

    // Data model already uses commands arrays — pass directly to v2 generator
    return generateV2Protocol({
        experiment_info: exp.experiment_info,
        rig_path: exp.rig_path || '',
        plugins: exp.plugins || [],
        experiment_structure: exp.experiment_structure,
        pretrial: { include: exp.pretrial.include, commands: exp.pretrial.commands || [] },
        intertrial: { include: exp.intertrial.include, commands: exp.intertrial.commands || [] },
        posttrial: { include: exp.posttrial.include, commands: exp.posttrial.commands || [] },
        conditions: exp.conditions
    });
}

function downloadYAML() {
    var yaml = generateYAML();
    var name = experiment.experiment_info.name || 'experiment';
    var filename = name.replace(/[^a-zA-Z0-9_\-]/g, '_').toLowerCase() + '_protocol.yaml';

    var blob = new Blob([yaml], { type: 'text/yaml' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════
// YAML Import
// ════════════════════════════════════════════════════

function handleYAMLImport(e) {
    var file = e.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(evt) {
        try {
            parseAndLoadYAML(evt.target.result);
        } catch (err) {
            alert('Failed to parse YAML: ' + err.message);
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

function parseAndLoadYAML(text) {
    var data = simpleYAMLParse(text);
    var isV2 = data.version === 2;

    if (data.experiment_info) {
        experiment.experiment_info.name = data.experiment_info.name || '';
        experiment.experiment_info.author = data.experiment_info.author || '';
        experiment.experiment_info.date_created = data.experiment_info.date_created || '';
        experiment.experiment_info.pattern_library = data.experiment_info.pattern_library || '';
    }

    // V2: rig path (replaces arena_info)
    if (data.rig) {
        experiment.rig_path = data.rig;
        // Try to infer arena config from rig path
        inferArenaFromRigPath(data.rig);
    }

    // V1: inline arena_info
    if (data.arena_info) {
        experiment.arena_info.generation = data.arena_info.generation || 'G4.1';
        experiment.arena_info.num_rows = parseInt(data.arena_info.num_rows) || 2;
        experiment.arena_info.num_cols = parseInt(data.arena_info.num_cols) || 12;
        matchArenaConfig();
    }

    // V2: plugins
    if (data.plugins && Array.isArray(data.plugins)) {
        experiment.plugins = data.plugins.map(function(p) {
            var entry = { name: p.name, type: p.type };
            if (p.matlab) entry.matlab = p.matlab;
            if (p.config) entry.config = p.config;
            if (p.port) entry.port = p.port;
            if (p.baudrate !== undefined) entry.baudrate = p.baudrate;
            if (p.script_path) entry.script_path = p.script_path;
            if (p.commands) entry.commands = p.commands;
            return entry;
        });
    } else {
        experiment.plugins = [];
    }

    if (data.experiment_structure) {
        experiment.experiment_structure.repetitions = parseInt(data.experiment_structure.repetitions) || 1;
        if (data.experiment_structure.randomization) {
            experiment.experiment_structure.randomization.enabled =
                data.experiment_structure.randomization.enabled === true ||
                data.experiment_structure.randomization.enabled === 'true';
            var seedVal = data.experiment_structure.randomization.seed;
            experiment.experiment_structure.randomization.seed =
                (seedVal === 'null' || seedVal == null) ? null : parseInt(seedVal);
        }
    }

    // Load phases — store command arrays directly
    var phases = ['pretrial', 'intertrial', 'posttrial'];
    for (var pi = 0; pi < phases.length; pi++) {
        var phaseName = phases[pi];
        if (data[phaseName]) {
            experiment[phaseName].include =
                data[phaseName].include === true || data[phaseName].include === 'true';
            if (data[phaseName].commands && Array.isArray(data[phaseName].commands)) {
                experiment[phaseName].commands = data[phaseName].commands;
            } else {
                experiment[phaseName].commands = cloneCommands(DEFAULT_PHASE.commands);
            }
        }
    }

    // Load conditions — store command arrays directly
    if (data.block && data.block.conditions && Array.isArray(data.block.conditions)) {
        experiment.conditions = [];
        for (var i = 0; i < data.block.conditions.length; i++) {
            var condData = data.block.conditions[i];
            experiment.conditions.push({
                id: condData.id || 'condition_' + (i + 1),
                commands: condData.commands || cloneCommands(DEFAULT_CONDITION.commands)
            });
        }
        if (experiment.conditions.length === 0) {
            experiment.conditions = [{ id: 'condition_1', commands: cloneCommands(DEFAULT_CONDITION.commands) }];
        }
    }

    // Backfill missing optional params so UI renders all input fields (#60)
    var bfPhases = ['pretrial', 'intertrial', 'posttrial'];
    for (var bpi = 0; bpi < bfPhases.length; bpi++) {
        if (experiment[bfPhases[bpi]].commands) {
            backfillPluginParams(experiment[bfPhases[bpi]].commands);
        }
    }
    for (var bci = 0; bci < experiment.conditions.length; bci++) {
        backfillPluginParams(experiment.conditions[bci].commands);
    }

    if (isV2 && experiment.plugins.length > 0) {
        console.log('Loaded v2 protocol with ' + experiment.plugins.length + ' plugin(s): ' +
            experiment.plugins.map(function(p) { return p.name; }).join(', '));
    }

    selection = null;
    syncSettingsToUI();
    renderTimeline();
    renderEditor();
    updateSummary();
    zoomToFit();
}

/**
 * Try to infer arena config from a rig path string.
 * e.g., "test_rig_G41_2x12_cw" → match G4.1, 2 rows, 12 cols
 */
function inferArenaFromRigPath(rigPath) {
    var m = rigPath.match(/G(6|4\.1|4|3)[_\-](\d+)[x×](\d+)/i);
    if (m) {
        var genMap = { '3': 'G3', '4': 'G4', '4.1': 'G4.1', '6': 'G6' };
        experiment.arena_info.generation = genMap[m[1]] || 'G4.1';
        experiment.arena_info.num_rows = parseInt(m[2]) || 2;
        experiment.arena_info.num_cols = parseInt(m[3]) || 12;
        matchArenaConfig();
    }
}

function matchArenaConfig() {
    var ai = experiment.arena_info;
    for (var name in STANDARD_CONFIGS) {
        var a = STANDARD_CONFIGS[name].arena;
        if (a.generation === ai.generation && a.num_rows === ai.num_rows && a.num_cols === ai.num_cols) {
            experiment.arena_config_key = name;
            document.getElementById('arenaConfig').value = name;
            updateArenaSummary();
            return;
        }
    }
}

// simpleYAMLParse is now imported from js/protocol-yaml.js

// ════════════════════════════════════════════════════
// Keyboard shortcuts
// ════════════════════════════════════════════════════

document.addEventListener('keydown', function(e) {
    // Delete/Backspace: remove selected condition
    if ((e.key === 'Delete' || e.key === 'Backspace') && selection && selection.type === 'condition') {
        if (document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
            e.preventDefault();
            removeCondition(selection.index);
        }
    }
    // Ctrl+E: export YAML
    if (e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        downloadYAML();
    }
});

// ════════════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════════════

init();
// Auto-select first condition so editor is immediately useful
selection = { type: 'condition', index: 0 };
renderTimeline();
renderEditor();
