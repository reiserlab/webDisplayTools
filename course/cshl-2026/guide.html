<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visual Behavior in Flies | CSHL 2026 Guide</title>
  <style>
    :root {
      --paper: #fffdf7;
      --ink: #17212b;
      --muted: #5d6670;
      --line: #d7ddd4;
      --soft: #f3efe3;
      --cyan: #0e8f9e;
      --coral: #df5b43;
      --gold: #c9941a;
      --leaf: #378b54;
      --plum: #6c4b8e;
      --black: #101417;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font: 16px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: var(--cyan);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    code {
      background: #edf1ee;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: #24313b;
      padding: 0.08em 0.3em;
      font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.92em;
    }

    pre {
      overflow-x: auto;
      background: #101417;
      color: #f6fbff;
      border-radius: 8px;
      padding: 16px;
    }

    pre code {
      background: transparent;
      border: 0;
      color: inherit;
      padding: 0;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .sidebar {
      background: var(--black);
      color: var(--white);
      border-right: 8px solid var(--gold);
      padding: 22px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      margin-bottom: 22px;
    }

    .brand .kicker {
      color: #a9dbe2;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.09em;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    .brand h1 {
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: 0;
      margin: 0;
    }

    .brand p {
      color: #cdd6d5;
      margin: 12px 0 0;
      font-size: 14px;
    }

    .draft {
      background: #2b2416;
      border: 1px solid #6a541a;
      color: #ffe7aa;
      border-radius: 8px;
      font-size: 13px;
      padding: 10px;
      margin: 0 0 18px;
    }

    .nav-group {
      margin: 0 0 18px;
    }

    .nav-group h2 {
      color: #9fb3b6;
      font-size: 12px;
      letter-spacing: 0.1em;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    .nav-link {
      color: #edf7f7;
      display: block;
      text-decoration: none;
      border-left: 4px solid transparent;
      padding: 7px 9px;
      margin: 2px 0;
      font-weight: 750;
      font-size: 14px;
    }

    .nav-link:hover,
    .nav-link.active {
      background: #1b2730;
      border-left-color: var(--cyan);
    }

    .content-wrap {
      min-width: 0;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 13px 28px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .topbar strong {
      color: var(--black);
    }

    .topbar .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 14px;
      font-weight: 800;
    }

    main {
      width: min(100%, 1240px);
      padding: 30px clamp(18px, 4vw, 54px) 72px;
    }

    .content {
      background: var(--white);
      border: 1px solid var(--line);
      border-top: 9px solid var(--cyan);
      border-radius: 8px;
      padding: 34px;
      box-shadow: 0 18px 45px rgba(23, 33, 43, 0.08);
    }

    .content h1 {
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.06;
      letter-spacing: 0;
      margin: 0 0 18px;
    }

    .content h2 {
      border-bottom: 3px solid var(--black);
      font-size: clamp(22px, 2.6vw, 27px);
      letter-spacing: 0;
      margin: 36px 0 14px;
      padding-bottom: 6px;
    }

    .content h3 {
      color: #1d3a45;
      font-size: 19px;
      margin: 28px 0 10px;
    }

    .content blockquote {
      border-left: 8px solid var(--gold);
      background: #fff6d7;
      margin: 20px 0;
      padding: 14px 18px;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 22px;
      font-size: 15px;
    }

    .content th {
      background: var(--black);
      color: var(--white);
      text-align: left;
    }

    .content th,
    .content td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      vertical-align: top;
    }

    .content tr:nth-child(even) td {
      background: #fafaf6;
    }

    .content img {
      max-width: 100%;
    }

    .content a,
    .content td,
    .content th {
      overflow-wrap: anywhere;
    }

    .content .pattern-preview--loom {
      filter: brightness(2);
    }

    .content hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 34px 0 0;
    }

    .loading,
    .error {
      color: var(--muted);
      font-weight: 800;
    }

    .error {
      color: #a8281d;
    }

    @media (max-width: 880px) {
      .shell {
        display: block;
      }

      .sidebar {
        height: auto;
        position: static;
        border-right: 0;
        border-bottom: 8px solid var(--gold);
      }

      .nav-group {
        display: inline-block;
        vertical-align: top;
        width: min(100%, 280px);
        margin-right: 14px;
      }

      .topbar {
        position: static;
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 22px 14px 46px;
      }

      .content {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="kicker">CSHL 2026</p>
        <h1>Visual Behavior in Flies</h1>
        <p>Demystifying fly-on-ball behavior.</p>
      </div>
      <div class="draft">
        Draft guide. This page is intentionally unlisted from public navigation.
      </div>
      <nav id="nav" aria-label="Guide sections"></nav>
    </aside>

    <div class="content-wrap">
      <header class="topbar">
        <strong id="doc-title">Course guide</strong>
        <div class="links">
          <a href="../../arena_studio.html" target="_blank" rel="noopener">Arena Studio</a>
          <a href="https://github.com/reiserlab/cshl-2026-course" target="_blank" rel="noopener">Course repo</a>
        </div>
      </header>
      <main>
        <article id="content" class="content">
          <p class="loading">Loading guide...</p>
        </article>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const docs = [
      {
        title: 'Start here',
        items: [
          ['README', 'Course guide'],
          ['tethering', 'Tethering basics'],
          ['rig-101', 'Rig 101'],
          ['fictrac', 'FicTrac basics'],
          ['arena-studio', 'Arena Studio'],
          ['pattern-editor', 'Pattern Editor'],
          ['github-overview', 'GitHub overview']
        ]
      },
      {
        title: 'Protocols',
        items: [
          ['protocols', 'Protocol overview'],
          ['p0-opto-intensity', 'P0 opto intensity'],
          ['p1-motion', 'P1 motion + looming'],
          ['p2-object', 'P2 object responses'],
          ['p3', 'P3 conditioning']
        ]
      },
      {
        title: 'Reference',
        items: [
          ['genotypes', 'Genotype shorthand'],
          ['references', 'References']
        ]
      }
    ];

    const pathBySlug = {
      'README': 'docs/README.md',
      'tethering': 'docs/tethering.md',
      'rig-101': 'docs/rig-101.md',
      'fictrac': 'docs/fictrac.md',
      'arena-studio': 'docs/arena-studio.md',
      'pattern-editor': 'docs/pattern-editor.md',
      'github-overview': 'docs/github-overview.md',
      'references': 'docs/references.md',
      'genotypes': 'docs/genotypes.md',
      'protocols': 'docs/protocols/README.md',
      'p0-opto-intensity': 'docs/protocols/p0-opto-intensity.md',
      'p1-motion': 'docs/protocols/p1-motion.md',
      'p2-object': 'docs/protocols/p2-object.md',
      'p3': 'docs/protocols/p3.md'
    };

    const slugByPath = Object.fromEntries(
      Object.entries(pathBySlug).map(([slug, path]) => [path, slug])
    );

    const content = document.getElementById('content');
    const nav = document.getElementById('nav');
    const title = document.getElementById('doc-title');

    function currentSlug() {
      const params = new URLSearchParams(location.search);
      return pathBySlug[params.get('doc')] ? params.get('doc') : 'README';
    }

    function buildNav(activeSlug) {
      nav.innerHTML = docs.map(group => `
        <div class="nav-group">
          <h2>${group.title}</h2>
          ${group.items.map(([slug, label]) => `
            <a class="nav-link ${slug === activeSlug ? 'active' : ''}" href="?doc=${slug}">${label}</a>
          `).join('')}
        </div>
      `).join('');
    }

    function docTitleFor(slug) {
      for (const group of docs) {
        const hit = group.items.find(([candidate]) => candidate === slug);
        if (hit) return hit[1];
      }
      return 'Course guide';
    }

    function rewriteLocalMarkdownLinks(currentPath) {
      const currentUrl = new URL(currentPath, location.href);
      const docsBase = new URL('docs/', location.href);
      content.querySelectorAll('a[href]').forEach(anchor => {
        const raw = anchor.getAttribute('href');
        if (!raw || raw.startsWith('#')) return;

        if (/^[a-z]+:/i.test(raw)) {
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener');
          return;
        }

        const resolved = new URL(raw, currentUrl);
        if (!resolved.href.startsWith(docsBase.href)) return;
        if (!resolved.pathname.endsWith('.md')) return;

        const relativePath = decodeURIComponent(resolved.href.slice(new URL('.', location.href).href.length));
        const slug = slugByPath[relativePath];
        if (slug) {
          anchor.setAttribute('href', `?doc=${slug}${resolved.hash || ''}`);
        } else {
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener');
        }
      });
    }

    function rewriteLocalMarkdownImages(currentPath) {
      const currentUrl = new URL(currentPath, location.href);
      const localBase = new URL('.', location.href);
      content.querySelectorAll('img[src]').forEach(image => {
        const raw = image.getAttribute('src');
        if (!raw || raw.startsWith('#') || /^[a-z]+:/i.test(raw)) return;

        const resolved = new URL(raw, currentUrl);
        if (!resolved.href.startsWith(localBase.href)) return;

        const relativePath = decodeURIComponent(resolved.href.slice(localBase.href.length));
        image.setAttribute('src', relativePath);
      });
    }

    async function loadDoc(slug) {
      const path = pathBySlug[slug];
      buildNav(slug);
      title.textContent = docTitleFor(slug);
      content.innerHTML = '<p class="loading">Loading guide...</p>';

      try {
        const response = await fetch(path, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const markdown = await response.text();
        if (!window.marked) throw new Error('Markdown renderer failed to load');
        content.innerHTML = marked.parse(markdown);
        rewriteLocalMarkdownLinks(path);
        rewriteLocalMarkdownImages(path);
        if (location.hash) {
          const id = decodeURIComponent(location.hash.slice(1));
          const target = document.getElementById(id);
          if (target) target.scrollIntoView();
        }
      } catch (error) {
        content.innerHTML = `<p class="error">Could not load this guide page: ${error.message}</p>`;
      }
    }

    loadDoc(currentSlug());
  </script>
</body>
</html>
