version: 3

# ============================================================================
# EXPERIMENT METADATA
# ============================================================================
experiment_info:
  name: "G4.1 Test Experiment using Bias and backlight"
  date_created: "2026-03-23"
  author: "Reiser Lab"
  pattern_library: './patterns/reference/G41_2x12_cw'  # UPDATE THIS TO FULL PATH

# ============================================================================
# ARENA CONFIGURATION
# ============================================================================
rig: '/Users/reiserm/Documents/GitHub/maDisplayTools/configs/rigs/test_rig_1.yaml'  # UPDATE THIS TO FULL PATH BEFORE USE

# ============================================================================
# VARIABLES
# ============================================================================
variables:
  IR_power:         &IR_power       50
  trial_duration:   &trial_dur      10
  trial_frame_rate: &fr_rate        10
  led_power:        &led_power      5
  baseline_wait:    &baseline_wait  10
  intertrial_wait:  &inter_wait     2


# ============================================================================
# PLUGIN DEFINITIONS
# ============================================================================
plugins:
# Class Plugin - Camera/video capture system
  - name: "camera"
    type: "class"
    matlab:
      class: "BiasPlugin"
#    config: # Optional - required config is in rig yaml. This config is for optional settings that may 
            # change between experiments. Values here that contradict rig yaml will override rig yaml.
      #saveDir: 'path/to/save/videos' # Optional, default is in experiment yaml's location. 
      #frame_rate: 150 # Optional, default is 100, a value outside of 10-200 will produce warning
      #video_format: 'avi' #Optional, default is 'ufmf', only other option is 'avi'
    # python: WOULD USE THIS IF PYTHON CLASS
    #   module: "pyDisplayTools.plugins.SimpleBias"
    #   class: "SimpleBias"
    # config:   # config established in rig yaml but can add here to override

  - name: "backlight"
    type: "class"
    matlab:
      class: "LEDControllerPlugin"

# ============================================================================
# EXPERIMENT SEQUENCE
# ============================================================================
 
experiment: 
  - "arena test"
  - "IR on"
  - "start recording"
  - "baseline"

  - name: "main block"
    trials:
      - "sq_grating_30deg_gs2 - red on/off during trial"
      - "sq_grating_30deg_gs16 - Green on middle through end"
      - "sq_grating_60deg_gs2 - blue beginning to middle"
      - "sq_grating_60deg_gs16 - red full trial"
      - "sine_grating_30deg_gs16 - no visible light"
      - "sine_grating_60deg_gs16 - green on/off twice"
      - "sine_grating_30deg_fine_gs16 - start red, add blue"
      - "sine_grating_60deg_fine_gs16 - blue panel 1, then 3, then 5"
      - "counter_0000_1000_gs2 - red 1,3,5, then blue 2,4,6"
    repetitions: 3
    randomize: false
    intertrial: "intertrial"

  - "shutdown"


# ============================================================================
# CONDITIONS LIBRARY
# ============================================================================

conditions: 

  - name: "arena test"
    commands:
    - type: "controller"
      command_name: "allOn"

    - type: "wait"
      duration: 1

    - type: "controller"
      command_name: "allOff"

  - name: "IR on"
    commands:
    - type: "plugin"      
      plugin_name: "backlight"
      command_name: "setVisibleBacklightsOff"

    - type: "plugin"
      plugin_name: "backlight"
      command_name: "setIRLEDPower"
      params:
        power: *IR_power

    - type: "plugin"
      plugin_name: "backlight"
      command_name: "turnOnLED"

    - type: "wait"
      duration: 0.5

  - name: "start recording"
    commands:
      - type: "plugin"
        plugin_name: "camera"
        command_name: "startRecording"
        params:
          filename: 'testExperiment'

  - name: "baseline"
    # 10 s baseline wait after recording starts, before any stimuli.
    commands:
      - type: "wait"
        duration: *baseline_wait

 # --- GRATINGS ---
  - name: "sq_grating_30deg_gs2 - red on/off during trial"
    commands:
        # Getting timestamp at start of trial instead of end for better consistency
      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat01_sq_grating_30deg_gs2_G4.pat"         
        pattern_ID: 1
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 3

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params:
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "wait"
        duration: 4

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

      - type: "wait"
        duration: 3

  - name: "sq_grating_30deg_gs16 - Green on middle through end"
    commands:
    
      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"
    
      - type: "controller"
        command_name: "trialParams"
        pattern: "pat02_sq_grating_30deg_gs16_G4.pat"
        pattern_ID: 2
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0
    
      - type: "wait"
        duration: 3
    
      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setGreenLEDPower"
        params:
          power: *led_power
          panel_num: 0
          pattern: "1010"
  
      - type: "wait"
        duration: 7
  
      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

  - name: "sq_grating_60deg_gs2 - blue beginning to middle"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params:
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat03_sq_grating_60deg_gs2_G4.pat"
        pattern_ID: 3
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 5

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

      - type: "wait"
        duration: 5

      
  - name: "sq_grating_60deg_gs16 - red full trial"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params:
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat04_sq_grating_60deg_gs16_G4.pat"
        pattern_ID: 4
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: *trial_dur

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"
      

  - name: "sine_grating_30deg_gs16 - no visible light"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat05_sine_grating_30deg_gs16_G4.pat"
        pattern_ID: 5
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: *trial_dur



  - name: "sine_grating_60deg_gs16 - green on/off twice"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat06_sine_grating_60deg_gs16_G4.pat"
        pattern_ID: 6
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 2

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setGreenLEDPower"
        params:
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "wait"
        duration: 2

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

      - type: "wait"
        duration: 2

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setGreenLEDPower"
        params: 
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "wait"
        duration: 2

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

      - type: "wait"
        duration: 2

  - name: "sine_grating_30deg_fine_gs16 - start red, add blue"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params: 
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat07_sine_grating_30deg_fine_gs16_G4.pat"
        pattern_ID: 7
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 3

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 0
          pattern: "1010"

      - type: "wait"
        duration: 7

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"


  - name: "sine_grating_60deg_fine_gs16 - blue panel 1, then 3, then 5"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 1

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat08_sine_grating_60deg_fine_gs16_G4.pat"
        pattern_ID: 8
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 3

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 3

      - type: "wait"
        duration: 3

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 5

      - type: "wait"
        duration: 4

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"
      

  # --- COUNTERS ---

  - name: "counter_0000_1000_gs2 - red 1,3,5, then blue 2,4,6"
    commands:

      - type: "plugin"
        plugin_name: "camera"
        command_name: "getTimestamp"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params: 
          power: *led_power
          panel_num: 1

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params: 
          power: *led_power
          panel_num: 3

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setRedLEDPower"
        params: 
          power: *led_power
          panel_num: 5

      - type: "controller"
        command_name: "trialParams"
        pattern: "pat09_counter_0000_1000_gs2_G4.pat"
        pattern_ID: 9
        duration: *trial_dur
        mode: 2
        frame_index: 1
        frame_rate: *fr_rate
        gain: 0

      - type: "wait"
        duration: 5

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 2

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 4

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setBlueLEDPower"
        params: 
          power: *led_power
          panel_num: 6

      - type: "wait"
        duration: 5

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "setVisibleBacklightsOff"

  - name: "intertrial"
    commands: 
      - type: "controller"
        command_name: "allOff"
  
      - type: "wait"
        duration: *inter_wait

  - name: "shutdown"
    commands: 
      - type: "controller"
        command_name: "allOff"

      - type: "plugin"
        plugin_name: "backlight"
        command_name: "turnOffLED"
      
      - type: "plugin"
        plugin_name: "camera"
        command_name: "stopRecording"
  
      - type: "plugin"
        plugin_name: "camera"
        command_name: "stopCapture"
  
      - type: "wait"
        duration: 1