version: 2

# ============================================================================
# EXPERIMENT METADATA
# ============================================================================
experiment_info:
  name: "G4.1 Test Experiment using Bias and backlight"
  date_created: "2026-03-23"
  author: "Reiser Lab"
  pattern_library: './patterns/reference/G41_2x12_cw'  # UPDATE THIS TO FULL PATH

# ============================================================================
# ARENA CONFIGURATION
# ============================================================================
rig: './configs/rigs/test_rig_1.yaml'  # UPDATE THIS TO FULL PATH BEFORE USE

# ============================================================================
# EXPERIMENT STRUCTURE
# ============================================================================
experiment_structure:
  repetitions: 1
  randomization:
    enabled: false
    seed: null
    method: "block"

# ============================================================================
# PLUGIN DEFINITIONS
# ============================================================================
plugins:
# Class Plugin - Camera/video capture system
  - name: "camera"
    type: "class"
    matlab:
      class: "BiasPlugin"
#    config: # Optional - required config is in rig yaml. This config is for optional settings that may 
            # change between experiments. Values here that contradict rig yaml will override rig yaml.
      #saveDir: 'path/to/save/videos' # Optional, default is in experiment yaml's location. 
      #frame_rate: 150 # Optional, default is 100, a value outside of 10-200 will produce warning
      #video_format: 'avi' #Optional, default is 'ufmf', only other option is 'avi'
    # python: WOULD USE THIS IF PYTHON CLASS
    #   module: "pyDisplayTools.plugins.SimpleBias"
    #   class: "SimpleBias"
    # config:   # config established in rig yaml but can add here to override

  - name: "backlight"
    type: "class"
    matlab:
      class: "LEDControllerPlugin"


# ============================================================================
# PRETRIAL - Sanity check: all panels ON briefly, turns on IR backlight, starts recording
# ============================================================================
pretrial:
  include: true
  commands:
    - type: "controller"
      command_name: "allOn"

    - type: "wait"
      duration: 1

    - type: "controller"
      command_name: "allOff"

    - type: "plugin"      
      plugin_name: "backlight"
      command_name: "setVisibleBacklightsOff"

    - type: "plugin"
      plugin_name: "backlight"
      command_name: "setIRLEDPower"
      params:
        power: 50

    - type: "plugin"
      plugin_name: "backlight"
      command_name: "turnOnLED"

    - type: "wait"
      duration: 0.5

    - type: "plugin"
      plugin_name: "camera"
      command_name: "startRecording"
      params:
        filename: 'testExperiment'

# ============================================================================
# BLOCK - 16 experiment pattern conditions
# ============================================================================
block:
  conditions:
    # --- GRATINGS ---

    - id: "sq_grating_30deg_gs2 - Red turns on during trial and turns off before trial end"
      commands:
        # Getting timestamp at start of trial instead of end for better consistency
        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat01_sq_grating_30deg_gs2_G4.pat"
          pattern_ID: 1
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params:
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "wait"
          duration: 4

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

        - type: "wait"
          duration: 3

    - id: "sq_grating_30deg_gs16 - Green turns on during trial and remains on for duration"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat02_sq_grating_30deg_gs16_G4.pat"
          pattern_ID: 2
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setGreenLEDPower"
          params:
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "wait"
          duration: 7

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

    - id: "sq_grating_60deg_gs2 - turns blue light on before start of trial and off during trial"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params:
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat03_sq_grating_60deg_gs2_G4.pat"
          pattern_ID: 3
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

        - type: "wait"
          duration: 5

        
    - id: "sq_grating_60deg_gs16 - has red light on for entire trial"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params:
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat04_sq_grating_60deg_gs16_G4.pat"
          pattern_ID: 4
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 10

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"
        

    - id: "sine_grating_30deg_gs16 - no backlight except constant IR"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat05_sine_grating_30deg_gs16_G4.pat"
          pattern_ID: 5
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 10



    - id: "sine_grating_60deg_gs16 - green light on and off quickly twice during display"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat06_sine_grating_60deg_gs16_G4.pat"
          pattern_ID: 6
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 2

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setGreenLEDPower"
          params:
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "wait"
          duration: 2

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

        - type: "wait"
          duration: 2

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setGreenLEDPower"
          params: 
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "wait"
          duration: 2

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

        - type: "wait"
          duration: 2

    - id: "sine_grating_30deg_fine_gs16 - start with red then add blue"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params: 
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat07_sine_grating_30deg_fine_gs16_G4.pat"
          pattern_ID: 7
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 0
            pattern: "1010"

        - type: "wait"
          duration: 7

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"


    - id: "sine_grating_60deg_fine_gs16 - light on panel 1 then add 3 then add 5"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 1

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat08_sine_grating_60deg_fine_gs16_G4.pat"
          pattern_ID: 8
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 3

        - type: "wait"
          duration: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 5

        - type: "wait"
          duration: 4

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"
        

    # --- COUNTERS ---

    - id: "counter_0000_1000_gs2 - panels 1 3 and 5 red at start, panels 2, 4, and 6 blue during trial"
      commands:

        - type: "plugin"
          plugin_name: "camera"
          command_name: "getTimestamp"

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params: 
            power: 5
            panel_num: 1

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params: 
            power: 5
            panel_num: 3

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setRedLEDPower"
          params: 
            power: 5
            panel_num: 5

        - type: "controller"
          command_name: "trialParams"
          pattern: "pat09_counter_0000_1000_gs2_G4.pat"
          pattern_ID: 9
          duration: 10
          mode: 2
          frame_index: 1
          frame_rate: 10
          gain: 0

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 2

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 4

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setBlueLEDPower"
          params: 
            power: 5
            panel_num: 6

        - type: "wait"
          duration: 5

        - type: "plugin"
          plugin_name: "backlight"
          command_name: "setVisibleBacklightsOff"

# ============================================================================
# INTERTRIAL - 2 second pause with arena off between conditions
# ============================================================================
intertrial:
  include: true
  commands:
    - type: "controller"
      command_name: "allOff"

    - type: "wait"
      duration: 2

# ============================================================================
# POSTTRIAL - Stop recording, turn off arena, turn off backlight.
# ============================================================================
posttrial:
  include: true
  commands:

    - type: "controller"
      command_name: "allOff"

    - type: "plugin"
      plugin_name: "backlight"
      command_name: "turnOffLED"
    
    - type: "plugin"
      plugin_name: "camera"
      command_name: "stopRecording"

    - type: "plugin"
      plugin_name: "camera"
      command_name: "stopCapture"

    - type: "wait"
      duration: 1
