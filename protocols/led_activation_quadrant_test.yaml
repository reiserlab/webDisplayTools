version: 3

# ============================================================================
# Conditional LED activation — quadrant test (web runner, Mode-3 closed loop)
#
# Tests the new per-trial `led_activation` (Arena Studio v0.59). Reuses the SAME
# built-in SD pattern the closed-loop block uses — NO new patterns needed:
#   4  frame2_h_ccw_200f   (a 200-frame full-azimuth rotation)
#
# The 200 frames map 1:1 onto azimuth (gain 1.8 = 360°/200), so the pattern
# divides into four 50-frame QUADRANTS:
#   Q1  frames   0– 49   (  0– 90°)
#   Q2  frames  50– 99   ( 90–180°)
#   Q3  frames 100–149   (180–270°)
#   Q4  frames 150–199   (270–360°)
# In closed loop the displayed frame index tracks the fly's heading, so gating
# the LED on quadrant bands turns it on/off as the fly rotates through them.
#
# HOW IT DRIVES THE LED: `startClosedLoop` enables the bridge's frame apply —
# that same event stream is what feeds led_activation, so the LED gating only
# runs INSIDE the startClosedLoop → wait → stopClosedLoop bracket. (This is also
# the bench check for "is closed-loop apply active?" — if the arena rotates with
# the fly, the LED gating is receiving frames too.)
#
# THREE conditions, each 30 s (`hold_dur`):
#   1. led_one_quadrant   — LED on in Q2 only            (single band, no hysteresis)
#   2. led_opposite       — LED on in Q1 + Q3            (two bands; 4 flips / rev)
#   3. led_one_quadrant_h — LED on in Q2, hysteresis 5   (anti-chatter at the edges)
#
# Needs the FicTrac bridge (`pixi run bridge`); with no fly, `pixi run sim`
# supplies synthetic heading. Requires fw #33+ (duty/AO) and a BuckPuck LED on
# Analog Out. Web-only — MATLAB does not read led_activation.
# ============================================================================

experiment_info:
  name: "Conditional LED activation — quadrant test"
  author: "webDisplayTools"

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

plugins:
  - name: "fictrac"
    type: "class"
    matlab:
      class: "FicTracPlugin"
    config:
      bridge_url: "ws://localhost:8765"
      fictrac_port: 60000
      proto: "udp"
      gain: 1.8
      offset: 0

variables:
  # Change ONE number to rescale. hold_dur drives each trial's trialParams
  # duration AND its bracketing wait (they must agree — see the waits rule).
  hold_dur: &hold_dur 30 # seconds of closed-loop hold per condition
  led_pct: &led_pct 20 # LED brightness % while active (BuckPuck curve)
  cl_gain: &cl_gain 1.8 # closed-loop heading→index gain (360/200)

experiment:
  - "led_one_quadrant"
  - "led_opposite"
  - "led_one_quadrant_h"
  - "shutdown"

conditions:
  # ---- 1) single quadrant, no hysteresis -----------------------------------
  # LED on across Q2 (frames 50–99), off elsewhere. As the fly's heading sweeps
  # through Q2 the LED switches on entering frame 50 and off leaving frame 99.
  - name: "led_one_quadrant"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "frame2_h_ccw_200f"
        pattern_ID: 4
        duration: *hold_dur
        mode: 3
        frame_index: 0
        frame_rate: 0
        gain: 0
        led_activation:
          level: *led_pct
          hysteresis: 0
          on_ranges:
            - [50, 99]
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *hold_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  # ---- 2) two opposite quadrants -------------------------------------------
  # LED on across Q1 (0–49) and Q3 (100–149) — four transitions per revolution,
  # exercising the multi-range on_ranges list.
  - name: "led_opposite"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "frame2_h_ccw_200f"
        pattern_ID: 4
        duration: *hold_dur
        mode: 3
        frame_index: 0
        frame_rate: 0
        gain: 0
        led_activation:
          level: *led_pct
          hysteresis: 0
          on_ranges:
            - [0, 49]
            - [100, 149]
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *hold_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  # ---- 3) single quadrant WITH hysteresis ----------------------------------
  # Same Q2 band, but hysteresis 5 frames (~9° at gain 1.8): the LED stays on
  # until the heading is >5 frames past the band edge, so dithering on the
  # boundary won't chatter the LED. Compare against condition 1 at the edges.
  - name: "led_one_quadrant_h"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "frame2_h_ccw_200f"
        pattern_ID: 4
        duration: *hold_dur
        mode: 3
        frame_index: 0
        frame_rate: 0
        gain: 0
        led_activation:
          level: *led_pct
          hysteresis: 5
          on_ranges:
            - [50, 99]
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: *cl_gain
      - type: "wait"
        duration: *hold_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  # ---- shutdown -------------------------------------------------------------
  # Blank the arena (also forces the LED off via the runner's activator
  # teardown on stopDisplay). Do NOT disconnect the bridge — the run-log export
  # runs after the sequence and needs it connected.
  - name: "shutdown"
    commands:
      - type: "controller"
        command_name: "stopDisplay"
      - type: "controller"
        command_name: "allOff"
