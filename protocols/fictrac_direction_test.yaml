version: 3

# ============================================================================
# FicTrac closed-loop + open-loop direction/speed test (web runner).
#
# Uses ONLY the built-in g6_2x10 patterns already on the SD card — no new
# patterns needed:
#   2 grating_sq · 3 grating_sine · 4 frame2_h_ccw_200f
#
# BLOCK 1 — OPEN LOOP (Mode 2), ~4 min:
#   both gratings (sq, sine) × 3 speeds (5/15/30 Hz) × 2 directions
#   (forward = +frame_rate, reverse = −frame_rate) = 12 trials, repeated 2×.
#   Each trial displays for `open_dur` seconds. Reverse uses NEGATIVE frame_rate
#   (int16, fw #4).
#
# BLOCK 2 — CLOSED LOOP (Mode 3 + FicTrac), ~1.5 min:
#   frame2_h_ccw_200f (a 200-frame full-azimuth rotation) host-stepped by FicTrac
#   heading through the bridge; gain 1.8 = 360/200 (one azimuth pixel per index),
#   `cl_dur` seconds per trial, repeated 3×.
#
# DURATION knobs (`variables:` below): change ONE number to rescale a block.
#   open_dur → every open-loop trial · cl_dur → the closed-loop trial.
#
# TIMING — no redundant waits. The web runner holds each trial for its
# trialParams `duration` on the HOST (the firmware auto-stop, issue #4, isn't
# landed), so a plain display trial needs NO `wait` — the open-loop trials are
# just a trialParams, and `open_dur` is their single duration knob. The
# closed-loop trial DOES need a wait: it brackets the closed-loop hold
# (startClosedLoop → wait → stopClosedLoop), so `cl_dur` drives both its
# trialParams duration and that wait.
#
# Total ≈ 5.5 min at defaults. Needs the FicTrac bridge (`pixi run bridge`);
# with no fly, `pixi run sim` supplies synthetic heading for the closed-loop
# block. NOTE (web-first): MATLAB has no FicTracPlugin (its closed-loop is
# analog Mode 4), so the closed-loop block runs on the WEB runner only.
# ============================================================================

experiment_info:
  name: "FicTrac closed-loop + open-loop direction/speed test"
  author: "webDisplayTools"

rig: "./configs/rigs/cshl_g6_2x10_ball.yaml"

plugins:
  - name: "fictrac"
    type: "class"
    matlab:
      class: "FicTracPlugin"
    config:
      bridge_url: "ws://localhost:8765"
      fictrac_port: 60000
      proto: "udp"
      gain: 1.8
      offset: 0

variables:
  # ── Speed knobs ────────────────────────────────────────────────────────────
  # Change the number here (or in the Edit view's Variables panel) to rescale a
  # whole block. Open-loop trials have a single duration field (no wait), so
  # open_dur is unambiguous. The closed-loop trial binds BOTH its trialParams
  # duration and its bracketing wait to cl_dur, so they move together.
  open_dur: &open_dur 10 # Block 1 open-loop grating trials (10 s each)
  cl_dur: &cl_dur 30 # Block 2 closed-loop rotation trials (30 s each)

experiment:
  - name: "open_loop_gratings"
    trials:
      - "sq_fwd_05"
      - "sq_fwd_15"
      - "sq_fwd_30"
      - "sq_rev_05"
      - "sq_rev_15"
      - "sq_rev_30"
      - "sine_fwd_05"
      - "sine_fwd_15"
      - "sine_fwd_30"
      - "sine_rev_05"
      - "sine_rev_15"
      - "sine_rev_30"
    repetitions: 2
  - name: "closed_loop_ball"
    trials:
      - "closed_loop_rotation"
    repetitions: 3
  - "shutdown"

conditions:
  # NOTE: no explicit fictrac connect/disconnect. The runner auto-connects the
  # bridge at run start, and — crucially — must NOT disconnect it at the end:
  # the recorded-run log is exported from the bridge AFTER the sequence finishes,
  # so a protocol-level disconnect would close the bridge before the log commits
  # (that broke the log on the first bench run). Let the run own the lifecycle.

  # ---- BLOCK 1: open-loop drifting gratings (Mode 2) -------------------------
  # frame_rate is the frame-advance rate in Hz; its SIGN is the drift direction
  # (+ forward, − reverse). No `wait`: the runner holds the trial for `duration`
  # (= open_dur) host-side, so each open-loop trial is a single trialParams with
  # one duration knob.

  # grating_sq (pattern 2) — forward
  - name: "sq_fwd_05"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 5
        gain: 0
  - name: "sq_fwd_15"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 15
        gain: 0
  - name: "sq_fwd_30"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 30
        gain: 0
  # grating_sq (pattern 2) — reverse (negative frame_rate)
  - name: "sq_rev_05"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -5
        gain: 0
  - name: "sq_rev_15"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -15
        gain: 0
  - name: "sq_rev_30"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sq"
        pattern_ID: 2
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -30
        gain: 0

  # grating_sine (pattern 3) — forward
  - name: "sine_fwd_05"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 5
        gain: 0
  - name: "sine_fwd_15"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 15
        gain: 0
  - name: "sine_fwd_30"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: 30
        gain: 0
  # grating_sine (pattern 3) — reverse (negative frame_rate)
  - name: "sine_rev_05"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -5
        gain: 0
  - name: "sine_rev_15"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -15
        gain: 0
  - name: "sine_rev_30"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "grating_sine"
        pattern_ID: 3
        duration: *open_dur
        mode: 2
        frame_index: 0
        frame_rate: -30
        gain: 0

  # ---- BLOCK 2: closed-loop rotation (Mode 3 + FicTrac) ----------------------
  # A 200-frame azimuthal rotation loaded static in Mode 3; FicTrac heading then
  # drives the frame index for `cl_dur` s (host streams SET_FRAME_POSITION via
  # the bridge). gain 1.8 = 360°/200 frames, so the arena rotates with the fly.
  # The `wait` is load-bearing here — it holds closed-loop ACTIVE for cl_dur
  # before stopClosedLoop fires (drop it and the stop would fire immediately).
  - name: "closed_loop_rotation"
    commands:
      - type: "controller"
        command_name: "trialParams"
        pattern: "frame2_h_ccw_200f"
        pattern_ID: 4
        duration: *cl_dur
        mode: 3
        frame_index: 0
        frame_rate: 0
        gain: 0
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "startClosedLoop"
        params:
          gain: 1.8
      - type: "wait"
        duration: *cl_dur
      - type: "plugin"
        plugin_name: "fictrac"
        command_name: "stopClosedLoop"

  # ---- shutdown --------------------------------------------------------------
  # Blank the arena only. Do NOT disconnect the bridge here — the run-log export
  # runs after the sequence, and needs the bridge still connected.
  - name: "shutdown"
    commands:
      - type: "controller"
        command_name: "stopDisplay"
      - type: "controller"
        command_name: "allOff"
